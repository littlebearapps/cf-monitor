name: Feature Request
description: Suggest an improvement to cf-monitor
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of cf-monitor would this affect?
      options:
        - SDK (monitor() wrapper)
        - Monitor Worker (new cron/endpoint)
        - CLI (new command or flag)
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's frustrating or missing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Include code examples if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider? Why is this one better?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or references to similar features in other tools.

name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Test coverage (enforces thresholds)
        run: npm run test:coverage

      - name: Build CLI
        run: npm run build:cli

      - name: CLI smoke test
        run: node dist/cli/index.js --help

      - name: Validate package exports (publint)
        run: npx publint

      - name: Validate type resolution (attw)
        run: npx @arethetypeswrong/cli --pack . --ignore-rules cjs-resolves-to-esm no-resolution

      - name: Verify package contents
        run: |
          OUTPUT=$(npm pack --dry-run 2>&1)
          if echo "$OUTPUT" | grep -qE '(tests/|\.claude/|\.env|\.dev\.vars)'; then
            echo "::error::Unwanted files in package tarball"
            exit 1
          fi

      - name: Lockfile registry validation
        run: npx lockfile-lint --path package-lock.json --type npm --allowed-hosts npm --allowed-schemes "https:"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
